version: '3.8'

services:
  vllm-cuszp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vllm-cuszp:latest
    container_name: vllm-cuszp-container
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      # Mount project directory for code changes
      - ../:/workspace
      # Optional: mount data directory
      - ./data:/workspace/data
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Default command: keep container running
    command: /bin/bash

